{% extends 'base.html' %}
{% block title %}New Ticket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="mb-4">
            <a href="{{ url_for('customer.dashboard') }}" class="text-muted small">
                <i class="bi bi-arrow-left me-1"></i> Back to Dashboard
            </a>
            <h4 class="fw-bold mt-2 mb-0">Create Support Ticket</h4>
            <p class="text-muted small">Our AI will auto-classify your ticket and assign priority.</p>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Subject <span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control"
                               placeholder="Brief summary of your issue" required maxlength="255">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                        <textarea name="description" class="form-control" rows="6"
                                  placeholder="Describe your issue in detail..." required></textarea>
                    </div>

                    <div class="alert alert-info d-flex align-items-center gap-2 py-2 small">
                        <i class="bi bi-robot"></i>
                        <span>Our AI will automatically detect the category and priority of your issue.</span>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary fw-semibold">
                            <i class="bi bi-send me-1"></i> Submit Ticket
                        </button>
                        <a href="{{ url_for('customer.dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
